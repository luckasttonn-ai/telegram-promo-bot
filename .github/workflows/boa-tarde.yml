name: Postar Boa Tarde

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Enviar Boa Tarde
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ☀️ Boa tarde, família!

            🔥 As promoções diárias estão bombando agora!

            🛒 Venha conferir as ofertas quentinhas do dia.
            Tem coisa boa te esperando!

            😊 Qual promoção você vai aproveitar hoje?
            Me conta!
